name: Update

permissions:
    contents: write
on:
    # Enable manual deployment
    workflow_dispatch:
    # This runs on the 37th minute of every hour, which is a random number we choose to
    # avoid peak minutes around :00 and :30
    schedule:
        - cron: "37 * * * *"

jobs:
    Firewall:
        runs-on: ubuntu-24.04-arm
        name: Ubuntu 24.04
        steps:
            -   name: 💝 Setup AWS CLI 💝
                uses: aws-actions/configure-aws-credentials@v6
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 💝 Checkout repository 💝
                uses: actions/checkout@v6

            -   name: 💝 Install blocklist prefabricator 💝
                uses: rarestype/r2-install-action@master
                with:
                    archive: prefabricator.tar.gz

            -   name: 💝 Build blocklist image 💝
                run: Scripts/Update
                env:
                    IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}

            -   name: 💝 Upload blocklist image 💝
                run: |
                    aws s3 cp firewall.bson.gz s3://swiftinit/ip/firewall.bson.gz \
                        --content-encoding gzip \
                        --content-type application/bson

            -   name: 💝 Update badge 💝
                uses: rarestype/rarestbadge@v1
                if: always()
                with:
                    title: Update
